name: PR Labels

on:
  pull_request:
    types: [opened, synchronize, reopened, labeled, unlabeled]

jobs:
  check-labels:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Extract valid labels from release.yml
        id: extract-labels
        run: |
          labels=$(
            yq eval '.changelog.categories[].labels[]' .github/release.yml \
              | grep -v '^\*$' \  # Remove wildcard entries (*)
              | tr '\n' ',' \      # Convert newlines to commas
              | sed 's/,$//'       # Remove trailing comma
          )
          echo "labels=$labels" >> $GITHUB_OUTPUT
          echo "Extracted labels: $labels"

      - uses: mheap/github-action-required-labels@v5
        with:
          mode: minimum
          count: 1
          labels: ${{ steps.extract-labels.outputs.labels }}
